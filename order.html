<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order - Byte Bistro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="order-page">

<header>
  <h1>Byte Bistro</h1>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="order.html">Order</a></li>
      <li><a href="reviews.html">Reviews</a></li>
    </ul>
  </nav>
</header>
<hr>

<main>
  <h2>Place Your Order</h2>
  <form method="post" action="order.php">

    <fieldset>
      <legend>Customer Info</legend>
      <p>
        <label for="name">Name</label><br>
        <input type="text" id="name" name="name" autocomplete="name" required>
      </p>
      <p>
        <label for="phone">Phone Number</label><br>
        <input type="tel" id="phone" name="phone" autocomplete="tel" required>
      </p>
    </fieldset>

    <fieldset>
      <legend>Food Order</legend>
      <p>
        <label for="entree">Entrée</label><br>
        <select id="entree" name="entree" required>
          <option value="Adana Kebab Plate">Adana Kebab Plate</option>
          <option value="İskender Kebab">İskender Kebab</option>
          <option value="Lahmacun">Lahmacun</option>
          <option value="Mantı">Mantı</option>
          <option value="Şiş Kebab">Şiş Kebab</option>
        </select>
      </p>
      <p>
        <label for="beverage">Beverage</label><br>
        <select id="beverage" name="beverage" required>
          <option value="Ayran">Ayran</option>
          <option value="Turkish Tea (Çay)">Turkish Tea (Çay)</option>
          <option value="Turkish Coffee">Turkish Coffee</option>
          <option value="Şalgam Suyu">Şalgam Suyu</option>
        </select>
      </p>
      <p>
        <label for="dessert">Dessert</label><br>
        <select id="dessert" name="dessert" required>
          <option value="Baklava">Baklava</option>
          <option value="Künefe">Künefe</option>
          <option value="Sütlaç">Sütlaç</option>
        </select>
      </p>
      <p>
        <strong>Add-ons (optional)</strong><br>
        <input type="checkbox" id="addon-yogurt" name="addons[]" value="Extra yogurt">
        <label for="addon-yogurt">Extra yogurt</label>
        <input type="checkbox" id="addon-pepper" name="addons[]" value="Hot pepper paste">
        <label for="addon-pepper">Hot pepper paste</label>
        <input type="checkbox" id="addon-pickle" name="addons[]" value="Pickles">
        <label for="addon-pickle">Pickles</label>
        <input type="checkbox" id="addon-kaymak" name="addons[]" value="Kaymak">
        <label for="addon-kaymak">Kaymak</label>
      </p>
    </fieldset>

    <fieldset>
      <legend>Dining Preferences</legend>
      <p>
        <strong>Pickup or delivery</strong><br>
        <input type="radio" id="pickup" name="dining-method" value="Pickup" checked>
        <label for="pickup">Pickup</label>
        <input type="radio" id="delivery" name="dining-method" value="Delivery">
        <label for="delivery">Delivery</label>
      </p>
      <p>
        <label for="time">Pickup or delivery time</label><br>
        <input type="time" id="time" name="time" required>
      </p>
      <p>
        <label for="instructions">Special instructions</label><br>
        <textarea id="instructions" name="instructions" rows="4" cols="40"></textarea>
      </p>
    </fieldset>

    <p>
      <input type="submit" value="Submit Order">
    </p>
  </form>
</main>
<hr>

<footer>

</footer>

</body>
</html>
